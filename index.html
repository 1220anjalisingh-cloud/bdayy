<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        color: #333;
        padding: 50px;
    }
    h1 {
        font-size: 40px;
    }
    .hidden {
        display: none;
        margin-top: 20px;
        font-size: 20px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        background: #ff4d6d;
        color: white;
        border-radius: 10px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>Happy Birthday ❤️</h1>
<h2 id="name">Hey [Her Name] 👀</h2>

<p>You are the best thing that ever happened to my system 💻❤️</p>

<button onclick="showMessage()">Click for Surprise 🎁</button>

<div class="hidden" id="message">
    <p>
        System Log 📜:<br><br>
        Day 1: Met you ❤️<br>
        Day 10: Started liking you 😊<br>
        Day 50: Fell in love 💖<br>
        Today: Still the best decision ever 💯<br><br>
        
        <b>Happy Birthday, my favorite person ❤️</b>
    </p>
</div>

<script>
function showMessage() {
    document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
